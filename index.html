<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻链接展示</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ========== 密码验证遮罩层 ========== -->
    <div id="auth-overlay" class="overlay">
        <div class="auth-box">
            <h1>📰 新闻链接</h1>
            <p class="auth-subtitle">请输入访问密码</p>
            <input type="password" id="password-input" placeholder="输入密码" autocomplete="off">
            <button id="auth-btn">进入</button>
            <p id="auth-error" class="error-msg"></p>
            <div class="auth-debug">
                <span id="debug-reset" class="debug-link">🔧 重置锁定</span>
            </div>
        </div>
    </div>

    <!-- ========== 主应用界面 ========== -->
    <div id="app" style="display:none;">

        <!-- 顶部导航 -->
        <header id="header">
            <div class="header-left">
                <h1>📰 新闻链接展示</h1>
            </div>
            <div class="header-right">
                <span id="issue-badge" class="badge"></span>
                <!-- 管理员面板 -->
                <div class="admin-panel">
                    <button id="admin-toggle" class="admin-toggle" title="管理面板">⚙️</button>
                    <div id="admin-actions" class="admin-actions collapsed">
                        <button id="import-btn" class="btn btn-primary" title="导入 Excel 更新新闻">📥 导入</button>
                        <button id="clear-btn" class="btn btn-danger" title="清空所有导入的数据">🗑️ 清除</button>
                        <button id="debug-btn" class="btn btn-debug" title="数据诊断">🔍 诊断</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main id="content">
            <!-- 筛选栏：公司 / 主题 / 年份 / 月份 / 区域 -->
            <div id="filter-bar">
                <select id="filter-company" class="filter-select">
                    <option value="all">全部公司</option>
                </select>
                <select id="filter-topic" class="filter-select">
                    <option value="all">全部主题</option>
                </select>
                <select id="filter-year" class="filter-select">
                    <option value="all">全部年份</option>
                </select>
                <select id="filter-month" class="filter-select">
                    <option value="all">全部月份</option>
                </select>
                <select id="filter-region" class="filter-select">
                    <option value="all">全部区域</option>
                </select>
            </div>

            <!-- 新闻内容区（主页卡片 / 栏目详情页） -->
            <div id="news-content"></div>

            <!-- 空状态 -->
            <div id="empty-state" style="display:none;">
                <div class="empty-icon">📡</div>
                <div class="empty-title">暂无新闻数据</div>
                <p class="empty-hint">请点击右上角 ⚙️ → 📥 导入 Excel 文件</p>
            </div>

            <!-- 加载提示 -->
            <div id="loading-state" style="display:none;">
                <p>加载中...</p>
            </div>
        </main>

        <!-- 底部 -->
        <footer id="footer">
            <span id="issue-info">加载中...</span>
        </footer>
    </div>

    <!-- ========== 隐藏的文件输入 ========== -->
    <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none;">

    <!-- ========== 诊断面板遮罩 ========== -->
    <div id="debug-overlay" class="overlay" style="display:none;">
        <div class="debug-box">
            <div class="debug-header">
                <h2>🔍 数据诊断</h2>
                <button id="debug-close" class="btn-close">✕</button>
            </div>
            <div class="debug-body" id="debug-body">
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <!-- ========== SheetJS (Excel 解析) ========== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- ========== JavaScript ========== -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/render.js"></script>
    <script src="js/filter.js"></script>
    <script src="js/import.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
